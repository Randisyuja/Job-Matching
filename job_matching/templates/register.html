{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
<div class="col-md-4">

<h3>Register</h3>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-success w-100">Register</button>
</form>

<p class="mt-3">
    Sudah punya akun?
    <a href="{% url 'login' %}">Login</a>
</p>

</div>
</div>

{% endblock %}
