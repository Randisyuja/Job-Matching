{% extends "base.html" %}
{% block content %}

<h3>Buat Lamaran</h3>

<div class="card">
    <div class="card-body">

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-success">
                Simpan
            </button>

            <a href="{% url 'lamaran_list' %}"
               class="btn btn-secondary">
                Kembali
            </a>
        </form>

    </div>
</div>

{% endblock %}
