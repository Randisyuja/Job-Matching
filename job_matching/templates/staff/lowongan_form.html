{% extends "base.html" %}
{% block content %}

<h2>Form Lowongan</h2>

<form method="post">
    {% csrf_token %}

    <h4>Data Lowongan</h4>
    {{ form.as_p }}

    <hr>

    <!-- Persyaratan -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between">
            <span>Persyaratan</span>
            <button type="button"
                    class="btn btn-sm btn-primary add-form"
                    data-prefix="{{ formset.prefix }}">
                + Tambah
            </button>
        </div>

        <div class="card-body">

            {{ formset.management_form }}

            <div class="formset-container"
                id="formset-{{ formset.prefix }}"
                data-prefix="{{ formset.prefix }}">

                {% for form in formset %}
                    <div class="formset-item border p-3 mb-2">
                        {{ form.as_p }}
                        <button type="button" class="btn btn-danger btn-sm remove-form">
                            Hapus
                        </button>
                    </div>
                {% endfor %}

            </div>

            <!-- Empty template -->
            <template id="empty-form-{{ formset.prefix }}">
                <div class="formset-item border p-3 mb-2">
                    {{ formset.empty_form.as_p|safe }}
                    <button type="button" class="btn btn-danger btn-sm remove-form">
                        Hapus
                    </button>
                </div>
            </template>
        </div>
    </div>

    <button class="btn btn-success">Simpan</button>

</form>

{% endblock %}
