{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
<div class="col-md-4">

<h3>Login</h3>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary w-100">Login</button>
</form>

<p class="mt-3">
    Belum punya akun?
    <a href="{% url 'register_peserta' %}">Register sebagai Peserta</a> |
    <a href="{% url 'register_staff' %}">Register sebagai Staff</a>
</p>

</div>
</div>

{% endblock %}
