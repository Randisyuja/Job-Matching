<!-- Navbar -->
    <nav class="bg-white shadow-sm fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'home' %}" class="text-2xl font-bold text-indigo-600">JobPortal</a>
            <div class="space-x-6 hidden md:flex items-center">
                <a href="{% url 'lowongan_list'%}" class="hover:text-indigo-600 transition">Lowongan</a>
                
                {% if user.is_staff %}
                    <!-- Admin Menu Dropdown -->
                    <div class="relative"
                        x-data="{ openAdmin: false }"
                        @keydown.escape.window="openAdmin = false"
                        @click.outside="openAdmin = false">

                        <button @click="openAdmin = !openAdmin"
                                type="button"
                                class="flex items-center hover:text-indigo-600 transition focus:outline-none">
                            Kelola
                            <svg class="w-4 h-4 ml-1 transition-transform duration-200"
                                :class="{ 'rotate-180': openAdmin }"
                                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" 
                                    stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </button>

                        <div x-show="openAdmin"
                            x-transition:enter="transition ease-out duration-200"
                            x-transition:enter-start="opacity-0 translate-y-2"
                            x-transition:enter-end="opacity-100 translate-y-0"
                            x-transition:leave="transition ease-in duration-150"
                            x-transition:leave-start="opacity-100 translate-y-0"
                            x-transition:leave-end="opacity-0 translate-y-2"
                            x-cloak
                            class="absolute left-0 mt-3 w-52 bg-white rounded-xl shadow-lg py-2 z-50 border border-gray-100">

                            <a href="{% url 'jenis_list'%}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                                Jenis Pekerjaan
                            </a>
                            <a href="{% url 'lowongan_list'%}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                                Kelola Lowongan
                            </a>
                            <a href="{% url 'peserta_list'%}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                                Kelola Peserta
                            </a>
                        </div>
                    </div>
                {% endif %}
                
                <!-- User Profile Dropdown -->
                {% if user.is_authenticated %}
                    <div class="relative"
                        x-data="{ openProfile: false }"
                        @keydown.escape.window="openProfile = false"
                        @click.outside="openProfile = false">

                        <!-- Profile Button -->
                        <button @click="openProfile = !openProfile"
                                type="button"
                                class="flex items-center space-x-2 hover:text-indigo-600 transition focus:outline-none">
                            <div class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-white font-medium">
                                {{ user.username|slice:":1"|upper }}
                            </div>
                            <span class="font-medium">{{ user.username }}</span>
                            <svg class="w-4 h-4 transition-transform duration-200"
                                :class="{ 'rotate-180': openProfile }"
                                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" 
                                    stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </button>

                        <!-- Dropdown Content -->
                        <div x-show="openProfile"
                            x-transition:enter="transition ease-out duration-200"
                            x-transition:enter-start="opacity-0 translate-y-2"
                            x-transition:enter-end="opacity-100 translate-y-0"
                            x-transition:leave="transition ease-in duration-150"
                            x-transition:leave-start="opacity-100 translate-y-0"
                            x-transition:leave-end="opacity-0 translate-y-2"
                            x-cloak
                            class="absolute right-0 mt-3 w-56 bg-white rounded-xl shadow-lg py-2 z-50 border border-gray-100">

                            <!-- User Info Header -->
                            <div class="px-4 py-3 border-b border-gray-100">
                                <p class="text-sm font-medium text-gray-900">{{ user.username }}</p>
                                <p class="text-xs text-gray-500 truncate">{{ user.email }}</p>
                            </div>

                            <!-- Menu Items -->
                            <div class="py-1">
                                {% if user.peserta_profile %}
                                    <a href="{% url 'peserta_profile' user.peserta_profile.pk %}" 
                                       class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                                        <svg class="w-4 h-4 mr-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                        </svg>
                                        Profil Saya
                                    </a>
                                {% endif %}

                                <a href="{% url 'lamaran_list' %}" 
                                   class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                                    <svg class="w-4 h-4 mr-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                    </svg>
                                    Lamaran Saya
                                </a>
                            </div>

                            <!-- Logout -->
                            <div class="border-t border-gray-100 py-1">
                                <form method="post" action="{% url 'logout' %}">
                                    {% csrf_token %}
                                    <button type="submit"
                                            class="flex items-center w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                                        <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                                        </svg>
                                        Logout
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                {% else %}
                    <a href="{% url 'login' %}" 
                       class="inline-flex items-center px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700 transition">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                        </svg>
                        Login
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>
